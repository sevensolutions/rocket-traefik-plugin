# The name of your plugin as displayed in the Plugins Catalog web UI.
displayName: Rocket Traefik Plugin

# For now, `middleware` is the only type available.
type: middleware

# The import path of your plugin.
import: github.com/sevensolutions/rocket-traefik-plugin/src

# A brief description of what your plugin is doing.
summary: "A traefik Plugin for Rocket"

# Medias associated to the plugin (optional)
iconPath: .assets/icon.png
# bannerPath: .assets/banner.png

# Configuration data for your plugin.
# This is mandatory, and Plugins Catalog will try to execute the plugin with the data you provide as part of its startup validity tests.
testData:
  LogLevel: DEBUG
  Mode: fallback
  InstanceKey: test-instance
  RocketBaseUrl: http://localhost
  RocketIdentityHeader: test
