http:
  services:
    whoami:
      loadBalancer:
        servers:
          - url: http://whoami:80

  middlewares:
    rocket-maintenance:
      plugin:
        rocket-traefik-plugin:
          LogLevel: DEBUG
          Mode: maintenance
          InstanceKey: 019e27d03e107969a2f094345b67a5ff
          RocketBaseUrl: http://rocket-mock:80
          RocketIdentityHeader: local-dev-secret
          CacheTtlSeconds: 5

    rocket-fallback:
      plugin:
        rocket-traefik-plugin:
          LogLevel: DEBUG
          Mode: fallback
          InstanceKey: 019e27d03e107969a2f094345b67a5ff
          RocketBaseUrl: http://rocket-mock:80
          RocketIdentityHeader: local-dev-secret
          CacheTtlSeconds: 5

  routers:
    # The "real" app route. Only wins while the whoami container/router is present,
    # since it has a higher priority than the fallback route below.
    whoami:
      entryPoints: ["web"]
      rule: "HostRegexp(`.+`)"
      priority: 10
      service: whoami
      middlewares: ["rocket-maintenance@file"]

    # Underlay fallback route (priority 1). Traefik only falls through here when no
    # higher-priority dynamic app router matches. Checks Rocket the same way as the
    # maintenance middleware above: shows the maintenance page if the app is down for
    # maintenance, otherwise the plain "unavailable" page.
    whoami-fallback:
      entryPoints: ["web"]
      rule: "HostRegexp(`.+`)"
      priority: 1
      service: whoami
      middlewares: ["rocket-fallback@file"]
