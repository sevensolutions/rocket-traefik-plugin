version: "3"

vars:
  INSTANCE_KEY: '{{.INSTANCE_KEY | default "whoami"}}'
  MOCK_URL: '{{.MOCK_URL | default "http://localhost:9081"}}'

tasks:
  up:
    desc: Start traefik, whoami and the rocket-mock server
    cmds:
      - docker compose up -d

  down:
    desc: Stop and remove the local dev stack
    cmds:
      - docker compose down

  logs:
    desc: Tail logs from the local dev stack
    cmds:
      - docker compose logs -f

  maintenance:on:
    desc: "Turn maintenance mode on (INSTANCE_KEY=..., MESSAGE=..., ALLOW_BYPASS=true|false, BYPASS_CODE=... [empty = open bypass])"
    vars:
      MESSAGE: '{{.MESSAGE | default "We are upgrading things, come back soon!"}}'
      ALLOW_BYPASS: '{{.ALLOW_BYPASS | default "true"}}'
      BYPASS_CODE: '{{.BYPASS_CODE | default "1234"}}'
    cmds:
      - |
        curl -X POST {{.MOCK_URL}}/api/v1/ingress/traefik/instances/{{.INSTANCE_KEY}}/status \
          -H "Content-Type: application/json" \
          -d '{"maintenanceEnabled": true, "message": "{{.MESSAGE}}", "allowBypass": {{.ALLOW_BYPASS}}, "bypassCode": "{{.BYPASS_CODE}}"}'

  maintenance:off:
    desc: "Turn maintenance mode off for an instance (INSTANCE_KEY=...)"
    cmds:
      - |
        curl -X POST {{.MOCK_URL}}/api/v1/ingress/traefik/instances/{{.INSTANCE_KEY}}/status \
          -H "Content-Type: application/json" \
          -d '{"maintenanceEnabled": false}'

  maintenance:status:
    desc: "Show current maintenance status for an instance (INSTANCE_KEY=...)"
    cmds:
      - curl -s {{.MOCK_URL}}/api/v1/ingress/traefik/instances/{{.INSTANCE_KEY}}/status
